<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Video</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: white;
}

/* Navbar */
.navbar {
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.7);
    position: fixed;
    width: 100%;
}

.navbar h1 {
    font-size: 20px;
}

/* Hero Video */
.hero {
    height: 100vh;
    overflow: hidden;
}

.hero video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Overlay */
.overlay {
    position: absolute;
    top: 40%;
    left: 50px;
}

.overlay h2 {
    font-size: 40px;
}

/* Video Grid */
.container {
    padding: 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1a1a1a;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card video {
    width: 100%;
}

.card p {
    padding: 10px;
}
</style>

</head>

<body>

<div class="navbar">
    <h1>MyVideo</h1>
</div>

<div class="hero">
    <video autoplay muted loop>
        <source src="video1.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <h2>Welcome to Premium Videos</h2>
        <p>Nikmati konten terbaik</p>
    </div>
</div>

<div class="container">
    <h2>Video Terbaru</h2>

    <div class="grid">
        <div class="card">
            <video controls>
                <source src="video2.mp4" type="video/mp4">
            </video>
            <p>Video 1</p>
        </div>

        <div class="card">
            <video controls>
                <source src="video3.mp4" type="video/mp4">
            </video>
            <p>Video 2</p>
        </div>
    </div>
</div>

</body>
</html>
